<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Exams - Online Exam Management System</title>
<link rel="stylesheet" href="../assets/css/style.css?v=20260720f">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand-mark"><span class="dot"></span> ExamPortal</div>

    <div class="side-label">Menu</div>
    <a class="side-link active" data-goto="exams"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span> My Exams</a>
    <a class="side-link" data-goto="results"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> My Results</a>
  </aside>

  <main class="main">
    <header class="app-top-header">
      <div class="header-breadcrumb">
        <span class="crumb-root" id="breadcrumbRoot">Menu</span>
        <span class="crumb-sep">›</span>
        <span class="crumb-current" id="breadcrumbCurrent">My Exams</span>
      </div>
      <div class="header-right">
        <div class="notif-wrap">
          <button type="button" class="notif-btn" id="notifBtn" aria-label="Notifications">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notif-badge" id="notifBadge" hidden>0</span>
          </button>
        </div>
        <button type="button" class="header-profile-chip" id="headerProfileBtn" aria-label="My profile">
          <span class="profile-avatar-btn"><span id="headerProfileAvatar">?</span></span>
          <span class="header-profile-text">
            <span class="header-profile-name" id="headerProfileName">…</span>
            <span class="header-profile-meta" id="headerProfileMeta">…</span>
          </span>
        </button>
      </div>
    </header>

    <div class="main-content">
    <div class="tab-panel active" id="exams">
      <div class="stat-row" id="statRow"></div>
      <div id="examCards" style="display:flex; flex-direction:column; gap:12px;"></div>
    </div>

    <div class="tab-panel" id="results">
      <div class="card">
        <div class="card-head"><h3>Your submitted exams</h3></div>
        <div class="card-body" style="padding:0;">
          <table id="myResultsTable"></table>
        </div>
      </div>
    </div>
    </div>
  </main>
</div>

<script src="../assets/js/main.js?v=20260720t"></script>
<script>
  const STUDENT_PAGES = {
    exams: ['My Exams', 'Exams scheduled for your batch this semester.'],
    results: ['My Results', 'Scores from exams you have submitted.']
  };

  initPanelNav(['exams', 'results'], STUDENT_PAGES, 'exams', 'Menu');

  if (location.hash === '#results') {
    goto('results');
  }

  function escapeHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function requireStudentSession() {
    try {
      const data = await api('auth/me.php');
      if (!data.user || data.user.role !== 'student') {
        window.location.href = '/login.html';
        return null;
      }
      initAppHeader(data.user, 'student');
      return data.user;
    } catch (_) {
      window.location.href = '/login.html';
      return null;
    }
  }

  async function signOut() {
    try {
      await api('auth/logout.php', { method: 'POST', body: '{}' });
    } catch (_) {}
    window.location.href = '/login.html';
  }

  const stampFor = s => ({
    live: '<span class="stamp live">Live now</span>',
    upcoming: '<span class="stamp upcoming">Upcoming</span>',
    closed: '<span class="stamp closed">Closed</span>',
    missed: '<span class="stamp missed">Missed</span>'
  }[s] || '');

  function actionFor(e) {
    if (e.status === 'live') {
      const label = e.attempt_status === 'in_progress' ? 'Resume exam' : 'Start exam';
      return `<button class="btn-primary" style="width:auto; padding:11px 22px;" onclick="location.href='exam.html?id=${e.id}'">${label}</button>`;
    }
    if (e.status === 'closed' && e.attempt_id) {
      return `<button class="btn-secondary" onclick="location.href='result.html?attempt_id=${e.attempt_id}'">View result</button>`;
    }
    const label = e.status === 'missed' ? 'Window closed' : 'Not started';
    return `<button class="btn-secondary" disabled style="opacity:.55; cursor:not-allowed;">${label}</button>`;
  }

  async function loadExams() {
    const data = await api('student/exams/list.php');
    const exams = data.exams || [];

    document.getElementById('statRow').innerHTML = `
      <div class="stat-card"><div class="num">${exams.filter(e => e.status === 'live').length}</div><div class="label">Available now</div></div>
      <div class="stat-card"><div class="num">${exams.filter(e => e.status === 'upcoming').length}</div><div class="label">Upcoming</div></div>
      <div class="stat-card"><div class="num">${exams.filter(e => e.status === 'closed').length}</div><div class="label">Completed</div></div>
      <div class="stat-card"><div class="num">${exams.filter(e => e.status === 'missed').length}</div><div class="label">Missed</div></div>
    `;

    document.getElementById('examCards').innerHTML = exams.length
      ? exams.map(e => `
        <div class="card">
          <div class="card-body" style="display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
            <div>
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
                <h3 style="font-size:16px;">${escapeHtml(e.title)}</h3>
                ${stampFor(e.status)}
              </div>
              <div style="color:var(--ink-soft); font-size:13px;">
                ${escapeHtml(e.subject)} &middot; ${e.questions} questions &middot; ${e.duration} min &middot; ${e.marks} marks
              </div>
              <div style="color:var(--ink-soft); font-size:12.5px; margin-top:4px;">${escapeHtml(e.window)}</div>
            </div>
            <div>${actionFor(e)}</div>
          </div>
        </div>`).join('')
      : `<div class="card"><div class="card-body"><div class="empty-state"><div class="glyph">&#128196;</div><h4>No exams yet</h4><p>When your teachers publish exams, they will show up here.</p></div></div></div>`;
  }

  async function loadResults() {
    const data = await api('student/results/list.php');
    const rows = data.results || [];
    document.getElementById('myResultsTable').innerHTML =
      '<tr><th>Exam</th><th>Score</th><th>Submitted</th><th></th></tr>' +
      (rows.length ? rows.map(r => `
        <tr>
          <td>${escapeHtml(r.exam)}</td>
          <td><strong>${r.score}</strong> / ${r.total}</td>
          <td style="color:var(--ink-soft);">${escapeHtml(r.submitted)}</td>
          <td><a href="result.html?attempt_id=${r.attempt_id}" style="color:var(--navy); font-weight:600; font-size:13px;">View review &rarr;</a></td>
        </tr>`).join('')
        : `<tr><td colspan="4"><div class="empty-state"><div class="glyph">&#128203;</div><h4>No results yet</h4><p>Results appear here right after you submit an exam.</p></div></td></tr>`);
  }

  (async () => {
    if (!(await requireStudentSession())) return;
    try {
      await Promise.all([loadExams(), loadResults()]);
    } catch (err) {
      document.getElementById('examCards').innerHTML =
        `<div class="card"><div class="card-body" style="color:var(--red);">${escapeHtml(err.message)}</div></div>`;
    }
  })();
</script>

<div class="modal-overlay" id="notifModal">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header"><h3>Notifications</h3></div>
    <div style="padding: 8px 22px 0;">
      <div class="notif-modal-list" id="notifModalList">
        <div class="notif-empty">Loading…</div>
      </div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" id="notifMarkAllBtn">Mark all read</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-header"><h3>My Profile</h3></div>
    <div style="padding: 8px 22px 0;">
      <div class="profile-modal-head">
        <div class="avatar-circle" id="profileModalAvatar">?</div>
        <div>
          <div style="font-size:17px; font-weight:600;" id="profileModalName"></div>
          <span class="badge" id="profileModalBadge">Student</span>
        </div>
      </div>
      <div class="info-grid" style="margin-bottom:8px;">
        <div class="info-item"><div class="label">Role</div><div class="value" id="profileModalRole"></div></div>
        <div class="info-item"><div class="label">Student ID</div><div class="value" id="profileModalId"></div></div>
        <div class="info-item"><div class="label">Department</div><div class="value" id="profileModalDept"></div></div>
        <div class="info-item"><div class="label">Email</div><div class="value" id="profileModalEmail"></div></div>
      </div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-primary" style="width:auto;" onclick="location.href='profile.html'">Full profile</button>
      <button type="button" class="btn-primary" style="width:auto; background:#ff0000;" onclick="signOut()">Sign out</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="logoutModal">
  <div class="modal">
    <h3>Sign out?</h3>
    <p>You'll need to sign in again to access your dashboard.</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
      <button class="btn-primary" style="width:auto; background:var(--red);" onclick="signOut()">Sign out</button>
    </div>
  </div>
</div>

</body>
</html>
